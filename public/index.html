<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Finder</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glassmorphism {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-800 to-blue-900 min-h-screen font-sans text-slate-100">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="mb-8 text-center text-white">
            <h1 class="text-4xl font-semibold mb-3 tracking-wide text-white">ATM Finder</h1>
            <p class="text-lg text-indigo-200">Find the nearest ATMs in Germany instantly</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sidebar for Search -->
            <div class="lg:col-span-1">
                <div class="glassmorphism rounded-2xl p-6 text-white mb-6">
                    <h2 class="text-xl font-medium mb-4">Search Location</h2>
                    <form id="search-form" class="space-y-4">
                        <div>
                            <label for="zip-code" class="block text-sm font-medium mb-2 text-indigo-100">German Zip Code</label>
                            <input type="text" id="zip-code" name="zip-code" required placeholder="e.g. 80331" 
                                class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-all">
                        </div>
                        <button type="submit" 
                            class="w-full py-3 px-4 bg-indigo-500 hover:bg-indigo-600 text-white font-medium rounded-xl shadow transition duration-300 ease-in-out transform hover:-translate-y-0.5">
                            Find ATMs
                        </button>
                    </form>
                    <div id="status-message" class="mt-4 text-sm hidden"></div>
                </div>
                
                <!-- Results List -->
                <div id="results-container" class="space-y-3 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar hidden">
                    <h3 class="text-lg font-medium text-white mb-3">Results</h3>
                    <div id="results-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- Map Area -->
            <div class="lg:col-span-2">
                <div class="glassmorphism rounded-3xl p-2 h-[600px] relative overflow-hidden shadow-2xl">
                    <div id="map" class="w-full h-full rounded-2xl bg-indigo-950/50 flex items-center justify-center">
                        <span class="text-indigo-200 font-medium">Map loading...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script to load config, maps, and handle logic -->
    <script>
        let map;
        let markers = [];

        // UI Elements
        const form = document.getElementById('search-form');
        const zipInput = document.getElementById('zip-code');
        const statusMsg = document.getElementById('status-message');
        const resultsContainer = document.getElementById('results-container');
        const resultsList = document.getElementById('results-list');

        function showMessage(msg, isError = false) {
            statusMsg.textContent = msg;
            statusMsg.className = `mt-4 text-sm p-3 rounded-xl shadow border ${isError ? 'bg-red-500/80 border-red-400 text-white' : 'bg-emerald-500/80 border-emerald-400 text-white'} block backdrop-blur-sm`;
        }

        function hideMessage() {
            statusMsg.className = 'hidden';
        }

        // 1. Fetch API Key and Load Google Maps
        async function loadApp() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                
                if (config.apiKey) {
                    const script = document.createElement('script');
                    script.src = `https://maps.googleapis.com/maps/api/js?key=${config.apiKey}&callback=initMap`;
                    script.async = true;
                    script.defer = true;
                    window.initMap = initMap;
                    document.head.appendChild(script);
                } else {
                    showMessage("Error: API key not provided by server.", true);
                }
            } catch (err) {
                console.error(err);
                showMessage("Failed to connect to the backend.", true);
            }
        }

        // 2. Initialize Map
        window.initMap = function() {
            // Default center: Germany
            const center = { lat: 51.1657, lng: 10.4515 };
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 6,
                center: center,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: true
            });
        };

        // 3. Handle Form Submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const zip = zipInput.value.trim();
            if (!zip) return;

            hideMessage();
            form.querySelector('button').disabled = true;
            form.querySelector('button').innerText = "Searching...";

            try {
                const response = await fetch(`/api/atms?zip_code=${encodeURIComponent(zip)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Server error');
                }

                updateMap(data);
                updateList(data);
                
                if (data.length === 0) {
                    showMessage("No ATMs found for this zip code.");
                } else {
                    showMessage(`Found ${data.length} ATM(s).`);
                }

            } catch (err) {
                console.error(err);
                showMessage(err.message, true);
            } finally {
                form.querySelector('button').disabled = false;
                form.querySelector('button').innerText = "Find ATMs";
            }
        });

        // 4. Update Map with new markers
        function updateMap(atms) {
            markers.forEach(m => m.setMap(null));
            markers = [];

            if (atms.length === 0) return;

            const bounds = new google.maps.LatLngBounds();
            const infoWindow = new google.maps.InfoWindow();

            atms.forEach(atm => {
                const position = { lat: atm.lat, lng: atm.lng };
                const marker = new google.maps.Marker({
                    position: position,
                    map: map,
                    title: atm.name,
                    animation: google.maps.Animation.DROP
                });
                
                marker.addListener("click", () => {
                    infoWindow.setContent(`
                        <div class="px-3 py-2 min-w-[180px]">
                            <h3 class="font-semibold text-gray-900 border-b border-gray-200 pb-2 mb-2 text-base">${atm.name}</h3>
                            <p class="text-sm text-gray-700">${atm.address}</p>
                            <p class="text-xs text-indigo-600 font-medium mt-2">Zip: ${atm.zip_code}</p>
                        </div>
                    `);
                    infoWindow.open(map, marker);
                });

                markers.push(marker);
                bounds.extend(position);
            });

            if (atms.length === 1) {
                map.setCenter(bounds.getCenter());
                map.setZoom(15);
            } else {
                map.fitBounds(bounds);
            }
        }

        // 5. Update UI list
        function updateList(atms) {
            resultsList.innerHTML = '';
            
            if (atms.length > 0) {
                resultsContainer.classList.remove('hidden');
                atms.forEach((atm, index) => {
                    const el = document.createElement('div');
                    el.className = "bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/20 hover:bg-white/20 transition-all cursor-pointer shadow-sm hover:shadow transform hover:-translate-y-0.5";
                    el.innerHTML = `
                        <h4 class="font-medium text-white text-base">${atm.name}</h4>
                        <p class="text-sm text-indigo-100 mt-1 font-light">${atm.address}</p>
                    `;
                    el.addEventListener('click', () => {
                        if (markers[index]) {
                            google.maps.event.trigger(markers[index], 'click');
                            map.setCenter(markers[index].getPosition());
                            map.setZoom(17);
                        }
                    });
                    resultsList.appendChild(el);
                });
            } else {
                resultsContainer.classList.add('hidden');
            }
        }

        // Start app
        loadApp();
    </script>
</body>
</html>
